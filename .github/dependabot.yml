version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
    groups:
      test:
        patterns:
          - "climate_control"
          - "govuk_schemas"
          - "minitest*"
          - "mocha"
          - "pact*"
          - "rack-test"
          - "simplecov"
          - "timecop"
          - "webmock"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
